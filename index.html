<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGM KBB - Anggota</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  
  <!-- Font & Icon -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splashScreen" class="splash-screen">
    <img src="assets/logo-pgm.png" alt="Logo PGM" class="splash-logo">
    <h2>PGM KBB</h2>
    <div class="loader"></div>
  </div>

  <!-- Halaman Login -->
  <div id="loginPage" class="container hidden">
    <div class="login-box">
      <img src="assets/logo-pgm.png" class="logo" alt="Logo PGM">
      <h2>Login Anggota</h2>
      <p class="subtitle">Masukkan NIK yang terdaftar di PGM KBB</p>
      
      <form id="loginForm">
  <div class="input-group">
    <i class="fas fa-id-card"></i>
    <input type="text" id="nik" placeholder="Masukkan NIK Anda" required>
  </div>
  <div class="input-group">
    <i class="fas fa-lock"></i>
    <input type="password" id="password" placeholder="Masukkan NIK lagi" required>
  </div>
  <button type="submit" class="btn-login">
    <i class="fas fa-sign-in-alt"></i> Masuk
  </button>
</form>
    </div>
  </div>

  <!-- Halaman Dashboard -->
  <div id="dashboardPage" class="container hidden">
    <div class="dashboard">
      <header class="dash-header">
        <div class="user-info">
          <img src="assets/logo-pgm.png" class="avatar" alt="Logo">
          <div>
            <h3 id="namaUser">Nama User</h3>
            <span id="labelRole" class="badge">Anggota</span>
          </div>
        </div>
        <button id="btnLogout" class="btn-logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </header>

      <main class="dash-content">
        <div class="card">
          <i class="fas fa-bullhorn"></i>
          <h4>Pengumuman</h4>
          <p>Belum ada pengumuman terbaru.</p>
        </div>

        <!-- Menu khusus Admin -->
        <button class="action-btn admin-only hidden" id="btnKelolaAnggota">
          <i class="fas fa-users-cog"></i> Kelola Anggota
        </button>
        
        <button class="action-btn admin-only hidden" id="btnLaporan">
          <i class="fas fa-file-alt"></i> Laporan Iuran
        </button>

        <!-- Menu untuk semua user -->
        <button class="action-btn" id="btnSertifikat">
          <i class="fas fa-certificate"></i> Lihat Sertifikat
        </button>
        
        <button class="action-btn" id="btnProfil">
          <i class="fas fa-user"></i> Profil Saya
        </button>
      </main>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay hidden">
    <div class="loader"></div>
  </div>

  <!-- Toast Notifikasi -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
